<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horizons // Infinite</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --bg: #050508;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0; background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Animated Mesh Gradient Background */
        .mesh {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            filter: blur(100px); opacity: 0.8;
        }

        /* Floating Modern Card */
        .glass-card {
            width: 90%; max-width: 500px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            backdrop-filter: blur(40px);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-size: 3.5rem; font-weight: 800; margin: 0;
            letter-spacing: -2px; line-height: 1;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 100px;
            background: rgba(255,255,255,0.05);
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; transition: 0.5s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0;
        }

        .stat-box {
            padding: 20px; border-radius: 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.4rem; font-weight: 800; color: #fff; }

        /* Modern Buttons */
        .btn {
            width: 100%; padding: 18px; border-radius: 20px;
            font-family: inherit; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: none; margin-bottom: 12px; display: block; text-decoration: none;
        }

        .btn-main { background: #fff; color: #000; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(255,255,255,0.15); }

        .btn-sec { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-sec:hover { background: rgba(255,255,255,0.1); }

        .btn-start { background: linear-gradient(90deg, var(--secondary), var(--accent)); color: #fff; }
        .btn-start:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Floating Heads */
        .heads-wrap { display: flex; justify-content: center; gap: -10px; margin-bottom: 20px; }
        .head-img { 
            width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--bg);
            background: #222; margin-left: -8px; transition: 0.3s;
        }
        .head-img:hover { transform: translateY(-5px); z-index: 10; }
    </style>
</head>
<body>

<div class="mesh"></div>

<div class="glass-card">
    <h1>Horizons</h1>
    
    <div class="status-pill">
        <div id="dot" class="dot"></div>
        <span id="status-text">Scanning...</span>
    </div>

    <div class="stat-grid">
        <div class="stat-box">
            <span class="label">Current Port</span>
            <span class="value" id="port">----</span>
        </div>
        <div class="stat-box">
            <span class="label">Players</span>
            <span class="value" id="players">0/0</span>
        </div>
    </div>

    <div class="heads-wrap" id="heads"></div>

    <button class="btn btn-main" onclick="fetchData()">Refresh Gateway</button>
    <button class="btn btn-sec" id="copyBtn" style="display:none" onclick="copy()">Copy Connection String</button>
    <a href="https://falixnodes.net" target="_blank" class="btn btn-start">Boot System</a>
</div>

<script>
    let addrStr = "";

    async function fetchData() {
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');
        
        try {
            const res = await fetch('https://mcsrvstat.us');
            const data = await res.json();

            if(data.online) {
                addrStr = `horizons.falix.dev:${data.port}`;
                statusText.innerText = "Active Link";
                dot.classList.add('active');
                document.getElementById('port').innerText = data.port;
                document.getElementById('players').innerText = `${data.players.online}/${data.players.max}`;
                document.getElementById('copyBtn').style.display = "block";
                
                const heads = document.getElementById('heads');
                heads.innerHTML = "";
                if(data.players.list) {
                    data.players.list.slice(0, 5).forEach(p => {
                        heads.innerHTML += `<img src="https://mc-heads.net{p.name}" class="head-img" title="${p.name}">`;
                    });
                }
            } else {
                statusText.innerText = "Node Offline";
                dot.classList.remove('active');
                document.getElementById('copyBtn').style.display = "none";
            }
        } catch (e) {
            statusText.innerText = "Connection Error";
        }
    }

    function copy() {
        navigator.clipboard.writeText(addrStr);
        alert("Address copied for TLauncher!");
    }

    // Run on load
    fetchData();
</script>

</body>
</html>
